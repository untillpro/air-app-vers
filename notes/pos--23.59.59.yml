locales:
  - name: en-en
    notes: |
      ## Major update with new features

      This version includes:
      - Added a new way to connect a device to BackOffice – Link by Alpha Code. 
      - Added an additional dialog to allow adding tips when paying via Tap to Pay. 
      - Added the ability in BackOffice to manage the visibility of tip screens separately for Terminal and Tap to Pay payments.
  - name: es-ES
    notes: |
      ## Actualización importante con nuevas funciones

      Esta versión incluye:
        - Se añadió una nueva forma de conectar un dispositivo a BackOffice – Link by Alpha Code.
        - Se añadió un diálogo adicional para permitir agregar propinas al pagar mediante Tap to Pay.
        - Se añadió la posibilidad en BackOffice de gestionar la visibilidad de las pantallas de propina por separado para pagos con Terminal y Tap to Pay.
  - name: nl-NL
    notes: |
      ## Grote update met nieuwe functies

      Deze versie bevat:
        - Een nieuwe manier toegevoegd om een apparaat met BackOffice te verbinden – Link by Alpha Code.
        - Een extra dialoog toegevoegd om fooien toe te voegen bij betalingen via Tap to Pay.
        - De mogelijkheid toegevoegd in BackOffice om de zichtbaarheid van fooischermen afzonderlijk te beheren voor Terminal- en Tap to Pay-betalingen.
  - name: fr-FR
    notes: |
      ## Mise à jour majeure avec de nouvelles fonctionnalités

      Cette version comprend :
        - Ajout d’une nouvelle méthode pour connecter un appareil à BackOffice – Link by Alpha Code.
        - Ajout d’une boîte de dialogue supplémentaire pour permettre l’ajout de pourboires lors des paiements via Tap to Pay.
        - Ajout de la possibilité dans BackOffice de gérer séparément la visibilité des écrans de pourboire pour les paiements par Terminal et Tap to Pay.
  - name: de-DE
    notes: |
      ## Großes Update mit neuen Funktionen

      Diese Version enthält:
        - Eine neue Möglichkeit hinzugefügt, ein Gerät mit dem BackOffice zu verbinden – Link by Alpha Code.
        - Ein zusätzlicher Dialog hinzugefügt, um das Hinzufügen von Trinkgeld bei Zahlungen über Tap to Pay zu ermöglichen.
        - Die Möglichkeit im BackOffice hinzugefügt, die Sichtbarkeit von Trinkgeldbildschirmen getrennt für Terminal- und Tap to Pay-Zahlungen zu verwalten.
